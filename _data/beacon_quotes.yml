# "Tonight's Beacon" — one pick shown per day, same for every visitor.
# app.js selects picks[Math.floor(Date.now()/86400000) % picks.length],
# so array ORDER is load-bearing: reordering changes which quote shows
# on a given date. Append new quotes to the end; don't reorder existing
# ones.
