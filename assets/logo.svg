<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" aria-hidden="true" role="img">
  <title>Beacon After Bell</title>
  <defs>
    <linearGradient id="beaconBeam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF2EC0"/>
      <stop offset="100%" stop-color="#FF5470"/>
    </linearGradient>
  </defs>

  <!-- bell silhouette: dome + flared mouth, quiet stroke -->
  <path d="M8,21 Q16,5 24,21" fill="none" stroke="#1B1140" stroke-width="1.5" stroke-linecap="round" opacity="0.28"/>
  <path d="M6.5,22.5 Q16,26 25.5,22.5" fill="none" stroke="#1B1140" stroke-width="1.5" stroke-linecap="round" opacity="0.28"/>

  <!-- flanking rays -->
  <path d="M10,8 L6.5,4.5" fill="none" stroke="url(#beaconBeam)" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <path d="M22,8 L25.5,4.5" fill="none" stroke="url(#beaconBeam)" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>

  <!-- beacon beam rising through the bell -->
  <path d="M13.3,2 L18.7,2 L22,22 L10,22 Z" fill="url(#beaconBeam)"/>
</svg>
