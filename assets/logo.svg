<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" aria-hidden="true" role="img">
  <title>Beacon After Bell</title>
  <defs>
    <!-- Beam brightens toward the top: light escaping upward -->
    <linearGradient id="beaconBeam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FFB020"/>
      <stop offset="100%" stop-color="#FFD666"/>
    </linearGradient>
  </defs>

  <!-- bell silhouette: dome + flared mouth -->
  <path d="M8,21 Q16,5 24,21" fill="none" stroke="#1B1140" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
  <path d="M6.5,22.5 Q16,26 25.5,22.5" fill="none" stroke="#1B1140" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>

  <!-- flanking rays, gold -->
  <path d="M10,8 L6.5,4.5" fill="none" stroke="#FFB020" stroke-width="1.4" stroke-linecap="round" opacity="0.65"/>
  <path d="M22,8 L25.5,4.5" fill="none" stroke="#FFB020" stroke-width="1.4" stroke-linecap="round" opacity="0.65"/>

  <!-- prism edges: the beam refracting into the spectrum (violet left, cyan right) -->
  <path d="M13.3,2 L10,22" fill="none" stroke="#8B5CF6" stroke-width="1.1" stroke-linecap="round" opacity="0.75"/>
  <path d="M18.7,2 L22,22" fill="none" stroke="#00D3E8" stroke-width="1.1" stroke-linecap="round" opacity="0.75"/>

  <!-- beacon beam rising through the bell -->
  <path d="M13.3,2 L18.7,2 L22,22 L10,22 Z" fill="url(#beaconBeam)"/>
</svg>
