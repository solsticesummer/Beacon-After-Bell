<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Favicon variant: no rays or spectrum hairlines, thicker strokes, so the
       bell + beam stay legible at 16px in a browser tab. -->
