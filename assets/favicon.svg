    <linearGradient id="beam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FFB020"/>
      <stop offset="100%" stop-color="#FFD666"/>
    </linearGradient>
  </defs>
  <path d="M12.6,2 L19.4,2 L23,22 L9,22 Z" fill="url(#beam)"/>
  <path d="M7,21 Q16,4 25,21" fill="none" stroke="#1B1140" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M5.5,23.5 Q16,27.5 26.5,23.5" fill="none" stroke="#1B1140" stroke-width="2.4" stroke-linecap="round"/>
</svg>
